<!-- templates/registration/login.html -->
{% extends "base.html" %}

{% block content %}
    <h2 class="title">Log In</h2>
    <form action="" method="post">
        {% csrf_token %}
        {{ form }}
        <button type="submit">Log In</button>
    </form>
    <div class="botones">
        <a href="{% url 'password_reset' %}">¿Has olvidado la contraseña?</a>
    </div>
{% endblock content %}
